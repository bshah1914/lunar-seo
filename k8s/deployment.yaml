apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketingos-backend
  labels:
    app: marketingos-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: marketingos-backend
  template:
    metadata:
      labels:
        app: marketingos-backend
    spec:
      containers:
        - name: backend
          image: marketingos/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: marketingos-secrets
            - configMapRef:
                name: marketingos-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: marketingos-backend
spec:
  selector:
    app: marketingos-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketingos-frontend
  labels:
    app: marketingos-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketingos-frontend
  template:
    metadata:
      labels:
        app: marketingos-frontend
    spec:
      containers:
        - name: frontend
          image: marketingos/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: marketingos-frontend
spec:
  selector:
    app: marketingos-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketingos-celery-worker
  labels:
    app: marketingos-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketingos-celery-worker
  template:
    metadata:
      labels:
        app: marketingos-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: marketingos/backend:latest
          command: ["celery", "-A", "celery_app", "worker", "-l", "info", "-Q", "seo,content,images,reports,social,ads,alerts", "-c", "4"]
          envFrom:
            - secretRef:
                name: marketingos-secrets
            - configMapRef:
                name: marketingos-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketingos-celery-beat
  labels:
    app: marketingos-celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketingos-celery-beat
  template:
    metadata:
      labels:
        app: marketingos-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: marketingos/backend:latest
          command: ["celery", "-A", "celery_app", "beat", "-l", "info"]
          envFrom:
            - secretRef:
                name: marketingos-secrets
            - configMapRef:
                name: marketingos-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: marketingos-config
data:
  APP_NAME: "MarketingOS"
  DEBUG: "false"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketingos-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: app.marketingos.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: marketingos-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketingos-frontend
                port:
                  number: 3000
